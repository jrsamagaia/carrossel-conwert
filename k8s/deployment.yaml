apiVersion: apps/v1
kind: Deployment
metadata:
  name: wert-app-deployment
  labels:
    app: wert-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wert-app
  template:
    metadata:
      labels:
        app: wert-app
    spec:
      containers:
      - name: wert-app-container
        image: wert-app:latest # Replace with your actual container registry URL
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: NODE_ENV
          value: "production"
